services:
  yhsm-v1:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pg:pgPassword@postgres:5432/pg_database
      BETTER_AUTH_SECRET: dev-secret-change-in-production
      BETTER_AUTH_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_ADMIN_URL: http://localhost:3000
      NEXT_PUBLIC_ADMIN_DOMAIN: localhost
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_DOMAIN: localhost
      NEXT_PUBLIC_URL_SHORTENER_URL: http://localhost:3000
      NEXT_PUBLIC_URL_SHORTENER_DOMAIN: localhost
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-yhw-sites}
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pg_database
      POSTGRES_USER: pg
      POSTGRES_PASSWORD: pgPassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pg -d pg_database"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
